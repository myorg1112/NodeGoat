# Test: Bridge CLI optional parameters — SARIF, source excludes, SAST-RAPID
# workflow_dispatch only — manual trigger to verify commented-out params work
name: Test Optional (CLI)

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write       # SARIF upload to Code Scanning

jobs:
  test-optional-params:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Bridge CLI
        run: |
          curl -fLsS -o bridge.zip "https://repo.blackduck.com/bds-integrations-release/com/blackduck/integration/bridge/binaries/bridge-cli-bundle/latest/bridge-cli-bundle-linux64.zip"
          unzip -qo bridge.zip
          chmod +x bridge-cli-bundle-linux64/bridge-cli

      - name: Polaris Scan with Optional Params
        env:
          BRIDGE_POLARIS_ACCESSTOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          ./bridge-cli-bundle-linux64/bridge-cli --stage polaris \
            polaris.serverurl="${{ vars.POLARIS_URL }}" \
            polaris.application.name="${{ github.repository_owner }}" \
            polaris.project.name="${{ github.event.repository.name }}" \
            polaris.branch.name="${{ github.ref_name }}" \
            polaris.assessment.types="SAST,SCA" \
            polaris.onboarding=true \
            polaris.test.sast.type=SAST-RAPID \
            polaris.reports.sarif.create=true \
            project.source.excludes='[".git","node_modules"]'

      - name: Find SARIF output
        if: always()
        run: |
          echo "=== Looking for SARIF files ==="
          find .bridge -name "*.sarif*" -o -name "*.json" | grep -i sarif || echo "No SARIF in .bridge/"
          find .blackduck -name "*.sarif*" 2>/dev/null || echo "No SARIF in .blackduck/"
          find . -maxdepth 2 -name "*.sarif*" 2>/dev/null || echo "No SARIF in project root"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .bridge/polaris_sarif_generator/
        continue-on-error: true  # don't fail the workflow if SARIF path is wrong — we'll see the error
