# Test: Bridge CLI optional parameters — SARIF upload + source excludes verification
# workflow_dispatch only — manual trigger
name: Test Optional (CLI)

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write       # SARIF upload to Code Scanning

jobs:
  test-optional-params:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test directory for excludes verification
        run: |
          mkdir -p test_exclude_dir
          echo 'console.log("should be excluded");' > test_exclude_dir/excluded.js
          echo "=== Files before scan ==="
          find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" | head -20

      - name: Download Bridge CLI
        run: |
          curl -fLsS -o bridge.zip "https://repo.blackduck.com/bds-integrations-release/com/blackduck/integration/bridge/binaries/bridge-cli-bundle/latest/bridge-cli-bundle-linux64.zip"
          unzip -qo bridge.zip
          chmod +x bridge-cli-bundle-linux64/bridge-cli

      - name: Polaris Scan with source excludes + SARIF
        env:
          BRIDGE_POLARIS_ACCESSTOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
        run: |
          ./bridge-cli-bundle-linux64/bridge-cli --stage polaris \
            --diagnostics \
            polaris.serverurl="${{ vars.POLARIS_URL }}" \
            polaris.application.name="${{ github.repository_owner }}" \
            polaris.project.name="${{ github.event.repository.name }}" \
            polaris.branch.name="${{ github.ref_name }}" \
            polaris.assessment.types="SAST,SCA" \
            polaris.onboarding=true \
            polaris.test.sast.type=SAST-RAPID \
            polaris.reports.sarif.create=true \
            project.source.excludes='[".git","node_modules","test_exclude_dir"]'

      - name: Verify SARIF output exists
        if: always()
        run: |
          echo "=== SARIF file check ==="
          ls -la .bridge/polaris_sarif_generator/report.sarif.json 2>/dev/null && echo "SARIF FILE FOUND" || echo "SARIF FILE NOT FOUND"
          echo ""
          echo "=== All SARIF files ==="
          find . -name "*.sarif*" 2>/dev/null || echo "No SARIF files anywhere"

      - name: Verify source excludes in diagnostics
        if: always()
        run: |
          echo "=== Check diagnostics for source excludes ==="
          if [ -f .bridge/bridge.log ]; then
            grep -i "exclude\|source.*upload\|test_exclude_dir" .bridge/bridge.log | head -30 || echo "No exclude-related entries in bridge.log"
          else
            echo "No bridge.log found"
          fi
          echo ""
          echo "=== diagnostics.json ==="
          if [ -f .bridge/diagnostics.json ]; then
            cat .bridge/diagnostics.json | python3 -m json.tool 2>/dev/null | grep -i "exclude\|source" | head -20 || echo "No exclude info in diagnostics.json"
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .bridge/polaris_sarif_generator/report.sarif.json
