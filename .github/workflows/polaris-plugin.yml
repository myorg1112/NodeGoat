# ============================================================================
# Polaris Security Scan — 3-Phase Policy Test
# ============================================================================
# This workflow is FIXED across all phases. Only the Polaris Policy changes:
#   Phase 1: Policy has fix-by dates, no rules     → scan passes (exit 0)
#   Phase 2: Policy adds rule → Jira ticket         → scan passes (exit 0)
#   Phase 3: Policy adds rule → Attempt Build Break → scan fails  (exit 8)
#
# Behavior:
#   - Push to master: Full SAST + SCA, policy check (break if policy says so)
#   - PR to master:   Rapid SAST + SCA, PR comments (Critical/High/Medium)
#
# Prerequisites:
#   1. Repo variable:  POLARIS_URL = https://your-polaris-server.blackduck.com
#   2. Repo secret:    POLARIS_ACCESS_TOKEN = your Polaris API token
# ============================================================================

name: Polaris Scan (Plugin)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  polaris-scan:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Black Duck Security Scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          # Connection
          polaris_server_url: ${{ vars.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}

          # Project mapping
          polaris_application_name: ${{ github.repository_owner }}
          polaris_project_name: ${{ github.event.repository.name }}
          polaris_branch_name: ${{ github.head_ref || github.ref_name }}
          polaris_branch_parent_name: ${{ github.base_ref || 'master' }}

          # Scan types — Rapid for PRs (fast feedback), Full for main (thorough)
          polaris_assessment_types: 'SAST,SCA'
          polaris_test_sast_type: ${{ github.event_name == 'pull_request' && 'SAST-RAPID' || 'SAST-FULL' }}

          # PR comments — only active on PRs (plugin auto-detects)
          polaris_prComment_enabled: ${{ github.event_name == 'pull_request' }}
          polaris_prComment_severities: 'CRITICAL,HIGH,MEDIUM'
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Build break — controlled by Polaris Policy, not this YAML
          # mark_build_status defaults to 'failure' — if policy has "Attempt Build Break"
          # rule and conditions match, the build will fail with exit code 8

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
