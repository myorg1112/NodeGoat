name: Polaris Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      sast_type:
        description: 'SAST scan type'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'SAST-RAPID'
          - 'SAST-FULL'

jobs:
  polaris-scan:
    runs-on: self-hosted

    env:
      POLARIS_URL: ${{ vars.POLARIS_URL }}
      APP_NAME: ${{ github.repository_owner }}
      PROJECT_NAME: ${{ github.event.repository.name }}
      # PR 時用 head_ref，push 時用 ref_name
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      PARENT_BRANCH: ${{ github.base_ref || 'master' }}
      REPO_NAME: ${{ github.event.repository.name }}
      REPO_OWNER: ${{ github.repository_owner }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      IS_PR: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Bridge CLI
        run: |
          curl -fLsS -o bridge.zip "https://repo.blackduck.com/bds-integrations-release/com/blackduck/integration/bridge/binaries/bridge-cli-bundle/latest/bridge-cli-bundle-linux64.zip"
          unzip -qo bridge.zip
          chmod +x bridge-cli-bundle-linux64/bridge-cli

      - name: Run Polaris Scan (Push)
        if: github.event_name != 'pull_request'
        env:
          BRIDGE_POLARIS_ACCESSTOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          SAST_TYPE: ${{ inputs.sast_type }}
        run: |
          EXTRA_ARGS=""
          if [ -n "$SAST_TYPE" ]; then
            EXTRA_ARGS="polaris.test.sast.type=$SAST_TYPE"
          fi
          ./bridge-cli-bundle-linux64/bridge-cli --stage polaris \
            polaris.serverurl="$POLARIS_URL" \
            polaris.application.name="$APP_NAME" \
            polaris.project.name="$PROJECT_NAME" \
            polaris.branch.name="$BRANCH_NAME" \
            polaris.assessment.types="SAST,SCA" \
            polaris.onboarding=true \
            $EXTRA_ARGS

      - name: Run Polaris Scan with PR Comments
        if: github.event_name == 'pull_request'
        env:
          BRIDGE_POLARIS_ACCESSTOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bridge-cli-bundle-linux64/bridge-cli --stage polaris \
            polaris.serverurl="$POLARIS_URL" \
            polaris.application.name="$APP_NAME" \
            polaris.project.name="$PROJECT_NAME" \
            polaris.branch.name="$BRANCH_NAME" \
            polaris.branch.parent.name="$PARENT_BRANCH" \
            polaris.assessment.types="SAST,SCA" \
            polaris.onboarding=true \
            polaris.prcomment.enabled=true \
            polaris.prcomment.severities='["CRITICAL","HIGH","MEDIUM"]' \
            github.repository.name="$REPO_NAME" \
            github.repository.owner.name="$REPO_OWNER" \
            github.repository.pull.number="$PR_NUMBER" \
            github.user.token="$GITHUB_TOKEN"
